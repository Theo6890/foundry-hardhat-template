[profile.default]
src = 'src'
out = 'out'
script = 'scripts'
libs = ["dependencies"]
solc_version = "0.8.26"
gas_reports = ["*"]
optimizer = true
optimizer_runs = 20_000
remappings = [
    "forge-std/=dependencies/forge-std-1.11.0/src/",
    "oz/=dependencies/@openzeppelin-contracts-5.5.0/",
    "solmate/=dependencies/@solmate-5.5.0/src/",
]

[profile.ci]
verbosity = 4

[profile.ci.fuzz]
runs = 10
fs_permissions = [{ access = "read", path = "./" }]

[rpc_endpoints]
fantom-testnet = "https://rpc.ankr.com/fantom_testnet"
mumbai = "${MUMBAI_RPC}"

[etherscan]
fantom-testnet = { key = "${FMT_KEY}" }
mumbai = { key = "${POLYGON_KEY}" }

[dependencies]
"@openzeppelin-contracts" = "5.5.0"
solmate = "89365b880c4f3c786bdd453d4b8e8fe410344a69"
forge-std = "1.14.0"

# See more config options https://github.com/foundry-rs/foundry/tree/master/config
